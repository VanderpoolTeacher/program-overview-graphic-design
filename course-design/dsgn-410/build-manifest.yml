# DSGN 410 Build Manifest
#
# Lifecycle: Design → Development → Deployed.
# Within each phase, artifacts are grouped by category.
# The scan script (scripts/scan-course-build.sh) reads this file,
# checks the filesystem and git, queries GitHub issues (when the
# `issue:` field is set), and emits a JSON file that the HTML
# dashboard consumes.
#
# State auto-derivation rules (override with `state:` only when
# auto-derivation is wrong):
#   1. file exists → done
#   2. file missing + linked issue is OPEN with "blocked" label → blocked
#   3. file missing + linked issue is OPEN → in-progress
#   4. file missing + no issue (or closed issue) → not-started

course: "DSGN 410 — The Business of Graphic Design"
slug: dsgn-410
first_run: "Spring 2029"
program_stage: 4

